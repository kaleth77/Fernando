<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Admin Facturas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 10px;
}

textarea {
    width: 100%;
    height: 150px;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: rgb(4, 5, 73);
    color: white;
    border: none;
    border-radius: 8px;
    margin-top: 10px;
}

#factura {
    display: none;
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-top: 15px;
}

.factura-header {
    text-align: center;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
    padding-bottom: 10px;
}

#lista {
    list-style: none;
    padding: 0;
}

#lista li {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dashed #ccc;
    padding: 5px 0;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
<h1>Panel Admin</h1>
<p>Generar Factura</p>
</header>

<div class="container">

<p>Pega aquí el pedido:</p>
<textarea id="pedido"></textarea>

<button onclick="generarFactura()">Generar factura</button>

<div id="factura">

    <div class="factura-header">
        <h2>🧾 FACTURA</h2>
        <p id="clienteNombre"></p>
        <p id="clienteCedula"></p>
        <p>Gracias por su compra</p>
    </div>

    <ul id="lista"></ul>

    <div class="total">
        Total: $<span id="total">0</span>
    </div>

    <!-- 🔥 BOTÓN REAL -->
    <button onclick="descargarPDF()">Descargar PDF</button>

</div>

</div>

<script>

function formato(num){
    return num.toLocaleString('es-CO');
}

function generarFactura(){

    let texto = document.getElementById("pedido").value;
    let lineas = texto.split("\n");

    let lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    lineas.forEach(l => {

        if(l.includes("$")){
            let partes = l.split("$");
            let precio = parseInt(partes[1].replace(/\./g,""));

            total += precio;

            let li = document.createElement("li");
            li.innerHTML = `<span>${partes[0]}</span><span>$${formato(precio)}</span>`;
            lista.appendChild(li);
        }

        if(l.includes("Cliente")){
            document.getElementById("clienteNombre").innerText = l;
        }

        if(l.includes("Cédula")){
            document.getElementById("clienteCedula").innerText = l;
        }

    });

    document.getElementById("total").innerText = formato(total);
    document.getElementById("factura").style.display = "block";
}


// 🔥 DESCARGA SEGURA
function descargarPDF() {

    let factura = document.getElementById("factura");

    let opciones = {
        margin: 0.3,
        filename: "factura.pdf",
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 3 },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    };

    html2pdf().set(opciones).from(factura).save();
}

</script>

</body>
</html>
