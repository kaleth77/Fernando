<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Servicios Electricos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 10px;
    max-width: 500px;
    margin: auto;
}

input[type="text"]{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:1px solid #ccc;
    box-sizing: border-box;
}

.servicio {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

/* BOTÓN AGREGAR */
.btn-agregar {
    width: 100%;
    padding: 10px;
    background: #ece2c8;
    border: none;
    border-radius: 6px;
    margin-top: 8px;
    font-weight: bold;
    color: #333;
    cursor: pointer;
}

/* BOTÓN VER MÁS */
.btn-ver {
    width: 100%;
    padding: 8px;
    background: none;
    border: none;
    color: #555;
    font-size: 13px;
    cursor: pointer;
}

/* SCROLL */
.descripcion {
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
    font-size: 13px;
    color: #555;
    margin-top: 5px;
}

.descripcion.activa {
    max-height: 220px;
    overflow-y: auto;
    padding-right: 5px;
}

.descripcion p {
    margin: 10px 0;
}

/* BOTÓN GENERAL */
button {
    width: 100%;
    padding: 12px;
    border: none;
    background: rgb(4, 5, 73);
    color: white;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

select.opciones {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* FACTURA */
#factura {
    display: none;
    background: white;
    margin-top: 15px;
    padding: 20px;
    border-radius: 12px;
}

.factura-header {
    text-align: center;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
    padding-bottom: 10px;
}

#lista {
    list-style: none;
    padding: 0;
}

#lista li {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dashed #ccc;
    padding: 5px 0;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}
</style>

</head>
<body>

<header>
    <h1>FB Servicios Eléctricos</h1>
    <p>Selecciona lo que necesitas</p>
</header>

<div class="container">

<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="text" id="cedulaCliente" placeholder="Cédula">

<!-- SERVICIOS (igual que los tuyos) -->

<!-- ✅ OTRO -->
<div class="servicio">
    <span>Otro servicio</span>
    <button class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>
    <input type="text" placeholder="Nombre del servicio" class="otro-nombre">
    <input type="text" placeholder="Valor" class="otro-precio">
    <input type="checkbox" data-nombre="Otro servicio" hidden>
</div>

<!-- FACTURA -->
<div id="factura">
    <div class="factura-header">
        <h2>🧾 FACTURA</h2>
        <p id="clienteNombre"></p>
        <p id="clienteCedula"></p>
        <p>Gracias por su compra</p>
    </div>

    <ul id="lista"></ul>

    <div class="total">
        Total: $<span id="total">0</span>
    </div>

    <button onclick="descargarPDF()">Descargar PDF</button>
</div>

<button onclick="generarFactura()">Generar factura</button>

</div>

<script>

function toggleCheck(btn) {
    let check = btn.parentElement.querySelector('input[type="checkbox"]');
    check.checked = !check.checked;
    btn.innerText = check.checked ? "Agregado ✔" : "Agregar";
}

function toggleDesc(btn) {
    let desc = btn.nextElementSibling;
    desc.classList.toggle("activa");
    btn.innerText = desc.classList.contains("activa") ? "Ver menos" : "Ver más";
}

function formato(num) {
    return num.toLocaleString('es-CO');
}

/* 🔥 FUNCIÓN FINAL CON PDF + WHATSAPP */
function generarFactura() {
    let nombreCliente = document.getElementById("nombreCliente").value;
    let cedula = document.getElementById("cedulaCliente").value;

    let checks = document.querySelectorAll('input[type="checkbox"]');
    let lista = document.getElementById("lista");
    let total = 0;
    let mensaje = "🧾 *Factura FB Servicios Eléctricos*%0A";

    lista.innerHTML = "";

    checks.forEach(c => {
        if (c.checked) {
            let servicio = c.parentElement;
            let select = servicio.querySelector(".opciones");

            let nombre = c.dataset.nombre;
            let precio = parseInt(c.value);

            if (select) {
                nombre = select.dataset.nombre;
                precio = parseInt(select.value);
            }

            let otroNombre = servicio.querySelector(".otro-nombre");
            let otroPrecio = servicio.querySelector(".otro-precio");

            if (otroNombre && otroPrecio && otroNombre.value && otroPrecio.value) {
                nombre = otroNombre.value;
                precio = parseInt(otroPrecio.value);
            }

            total += precio;

            let li = document.createElement("li");
            li.innerHTML = `<span>${nombre}</span><span>$${formato(precio)}</span>`;
            lista.appendChild(li);

            mensaje += `• ${nombre}: $${formato(precio)}%0A`;
        }
    });

    document.getElementById("clienteNombre").innerText = nombreCliente;
    document.getElementById("clienteCedula").innerText = "Cédula: " + cedula;
    document.getElementById("total").innerText = formato(total);
    document.getElementById("factura").style.display = "block";

    mensaje += `%0A💰 *Total:* $${formato(total)}`;

    // 🔥 GENERAR PDF Y ENVIAR LINK
    html2pdf().from(document.getElementById("factura")).outputPdf('blob').then(function(pdf){

        let url = URL.createObjectURL(pdf);

        let mensajeFinal = mensaje + `%0A📄 Descargar factura:%0A${encodeURIComponent(url)}`;

        window.open(`https://wa.me/573023507438?text=${mensajeFinal}`, '_blank');

    });
}

function descargarPDF() {
    let factura = document.getElementById("factura");

    html2pdf().from(factura).save("factura.pdf");
}

</script>

</body>
</html>
