<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 10px;
    max-width: 500px;
    margin: auto;
}

input[type="text"]{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.servicio {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

/* BOTÓN AGREGAR */
.btn-agregar {
    width: 100%;
    padding: 10px;
    background: #ece2c8;
    border: none;
    border-radius: 6px;
    margin-top: 8px;
    font-weight: bold;
}

/* BOTÓN VER MÁS */
.btn-ver {
    width: 100%;
    padding: 8px;
    background: none;
    border: none;
    color: #555;
    font-size: 13px;
}

.descripcion {
    max-height: 0;
    overflow: hidden;
    transition: 0.3s;
    font-size: 13px;
    color: #555;
    margin-top: 5px;
}

.descripcion.activa {
    max-height: 100px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: rgb(4, 5, 73);
    color: white;
    border-radius: 8px;
    margin-top: 10px;
}

/* FACTURA (NO TOCADA) */
#factura {
    display: none;
    background: white;
    margin-top: 15px;
    padding: 20px;
    border-radius: 12px;
}

.factura-header {
    text-align: center;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
    padding-bottom: 10px;
}

#lista {
    list-style: none;
    padding: 0;
}

#lista li {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dashed #ccc;
    padding: 5px 0;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}
#factura {
    display: block !important;
}
</style>

</head>
<body>

<header>
<h1>Servicios</h1>
<p>Selecciona lo que necesitas</p>
</header>

<div class="container">

<!-- CLIENTE -->
<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="text" id="cedulaCliente" placeholder="Cédula">

<!-- SERVICIO 1 -->
<div class="servicio">
    <span>Diseño web - $100.000</span>

    <button class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>
    <button class="btn-ver" onclick="toggleDesc(this)">Ver más</button>

    <div class="descripcion">Creamos páginas modernas y optimizadas.</div>

    <input type="checkbox" value="100000" data-nombre="Diseño web" hidden>
</div>

<!-- SERVICIO 2 -->
<div class="servicio">
    <span>Tienda online - $150.000</span>

    <button class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>
    <button class="btn-ver" onclick="toggleDesc(this)">Ver más</button>

    <div class="descripcion">Tiendas con carrito profesional.</div>

    <input type="checkbox" value="150000" data-nombre="Tienda online" hidden>
</div>

<!-- SERVICIO 3 -->
<div class="servicio">
    <span>Mantenimiento - $50.000</span>

    <button class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>
    <button class="btn-ver" onclick="toggleDesc(this)">Ver más</button>

    <div class="descripcion">Soporte y mejoras constantes.</div>

    <input type="checkbox" value="50000" data-nombre="Mantenimiento" hidden>
</div>

<button onclick="generarFactura()">Generar factura</button>

<!-- FACTURA -->
<div id="factura">
    <div class="factura-header">
        <h2>🧾 FACTURA</h2>
        <p id="clienteNombre"></p>
        <p id="clienteCedula"></p>
        <p>Gracias por su compra</p>
    </div>

    <ul id="lista"></ul>

    <div class="total">
        Total: $<span id="total">0</span>
    </div>

    <button onclick="descargarPDF()">Descargar PDF</button>
</div>

</div>

<script>

function toggleCheck(btn) {
    let check = btn.parentElement.querySelector('input[type="checkbox"]');
    check.checked = !check.checked;
    btn.innerText = check.checked ? "Agregado ✔" : "Agregar";
}

function toggleDesc(btn) {
    let desc = btn.nextElementSibling;
    desc.classList.toggle("activa");
    btn.innerText = desc.classList.contains("activa") ? "Ver menos" : "Ver más";
}

function formato(num){
    return num.toLocaleString('es-CO');
}

function generarFactura() {

    let nombreCliente = document.getElementById("nombreCliente").value;
    let cedula = document.getElementById("cedulaCliente").value;

    let checks = document.querySelectorAll('input[type="checkbox"]');
    let lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    let hayServicios = false;

    checks.forEach(c => {
        if (c.checked) {
            hayServicios = true;

            let nombre = c.dataset.nombre;
            let precio = parseInt(c.value);

            total += precio;

            let li = document.createElement("li");
            li.innerHTML = `<span>${nombre}</span><span>$${precio}</span>`;
            lista.appendChild(li);
        }
    });

    if (!hayServicios) {
        alert("Agrega al menos un servicio");
        return;
    }

    document.getElementById("clienteNombre").innerText = nombreCliente;
    document.getElementById("clienteCedula").innerText = "Cédula: " + cedula;

    document.getElementById("total").innerText = formato(total);
    document.getElementById("factura").style.display = "block";
}

function descargarPDF() {
    let factura = document.getElementById("factura");

    let opciones = {
        margin: 0.3,
        filename: "factura.pdf",
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { 
            scale: 3,
            useCORS: true,
            scrollY: 0
        },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    };

    // 👇 Esto arregla el problema en celular
    html2pdf().set(opciones).from(factura).outputPdf('blob').then(function (pdf) {
        let url = URL.createObjectURL(pdf);

        // 📱 En celular abre el PDF para descargarlo
        window.open(url, '_blank');

        // 💻 En PC intenta descargar
        let a = document.createElement("a");
        a.href = url;
        a.download = "factura.pdf";
        a.click();
    });
}

</script>

</body>
</html>
