<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Servicios Eléctricos</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 10px;
    max-width: 500px;
    margin: auto;
}

input[type="text"],
input[type="number"]{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
    box-sizing: border-box;
}

.servicio {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.btn-agregar {
    width: 100%;
    padding: 10px;
    background: #ece2c8;
    border: none;
    border-radius: 6px;
    margin-top: 8px;
    font-weight: bold;
    color: #333;
    cursor: pointer;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: rgb(4, 5, 73);
    color: white;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

select.opciones {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}
</style>
</head>
<body>

<header>
    <h1>FB Servicios Eléctricos</h1>
    <p>Selecciona lo que necesitas</p>
</header>

<div class="container">

<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="text" id="cedulaCliente" placeholder="Cédula">

<!-- SERVICIO 1 -->
<div class="servicio">
    <span>Visita técnica de valoración - $20.000</span>
    <button type="button" class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>
    <input type="checkbox" value="20000" data-nombre="Visita técnica de valoración" hidden>
</div>

<!-- SERVICIO 2 -->
<div class="servicio">
    <span>Mantenimiento en aires acondicionado</span>
    <button type="button" class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>

    <select class="opciones" data-nombre="Mantenimiento en aires acondicionado">
        <option value="80000">Opción 1 - Mantenimiento</option>
        <option value="120000">Opción 2 - Preventivo</option>
    </select>

    <input type="checkbox" data-nombre="Mantenimiento en aires acondicionado" hidden>
</div>

<!-- SERVICIO 3 -->
<div class="servicio">
    <span>Instalaciones Eléctricas</span>

    <button type="button" class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>

    <select class="opciones" data-nombre="Instalaciones Eléctricas">
        <option value="20000">Opción 1 - 110V ($20.000 por punto)</option>
        <option value="35000">Opción 2 - 220V ($35.000 por punto)</option>
    </select>

    <input type="number"
           class="cantidad-puntos"
           placeholder="Cantidad de puntos"
           min="1">

    <input type="checkbox" data-nombre="Instalaciones Eléctricas" hidden>
</div>

<!-- SERVICIO 4 -->
<div class="servicio">
    <span>Reparaciones menores - $50.000</span>
    <button type="button" class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>
    <input type="checkbox" value="50000" data-nombre="Reparaciones menores" hidden>
</div>

<!-- OTRO -->
<div class="servicio">
    <span>Otro servicio</span>
    <button type="button" class="btn-agregar" onclick="toggleCheck(this)">Agregar</button>
    <input type="text" placeholder="Nombre del servicio" class="otro-nombre">
    <input type="text" placeholder="Valor" class="otro-precio">
    <input type="checkbox" hidden>
</div>

<button type="button" onclick="enviarPedido()">Pedir servicio</button>

</div>

<script>
function toggleCheck(btn) {
    let check = btn.parentElement.querySelector('input[type="checkbox"]');
    check.checked = !check.checked;
    btn.innerText = check.checked ? "Agregado ✔" : "Agregar";
}

function formato(num) {
    return num.toLocaleString('es-CO');
}

function enviarPedido() {

    let nombreCliente = document.getElementById("nombreCliente").value;
    let cedula = document.getElementById("cedulaCliente").value;

    let checks = document.querySelectorAll('input[type="checkbox"]');

    let mensaje = "📩 *Nuevo pedido de servicio*%0A%0A";
    mensaje += "👤 Cliente: " + nombreCliente + "%0A";
    mensaje += "🆔 Cédula: " + cedula + "%0A%0A";
    mensaje += "🧾 *Factura*%0A";
    mensaje += "━━━━━━━━━━%0A";

    let total = 0;

    checks.forEach(c => {
        if (c.checked) {

            let servicio = c.parentElement;
            let select = servicio.querySelector(".opciones");
            let puntosInput = servicio.querySelector(".cantidad-puntos");

            let nombre = c.dataset.nombre || "Servicio";
            let subtotal = parseInt(c.value) || 0;

            if (select) {
                let precio = parseInt(select.value);

                if (puntosInput && puntosInput.value) {
                    let puntos = parseInt(puntosInput.value);
                    subtotal = precio * puntos;

                    mensaje += `• ${nombre}%0A`;
                    mensaje += `   ${puntos} punto(s) x $${formato(precio)} = $${formato(subtotal)}%0A`;

                    total += subtotal;
                    return;
                } else {
                    subtotal = precio;
                }
            }

            let otroNombre = servicio.querySelector(".otro-nombre");
            let otroPrecio = servicio.querySelector(".otro-precio");

            if (otroNombre && otroPrecio && otroNombre.value && otroPrecio.value) {
                nombre = otroNombre.value;
                subtotal = parseInt(otroPrecio.value);
            }

            total += subtotal;

            mensaje += `• ${nombre} - $${formato(subtotal)}%0A`;
        }
    });

    mensaje += "━━━━━━━━━━%0A";
    mensaje += `💰 *Total estimado:* $${formato(total)}`;

    window.open(`https://wa.me/573023507438?text=${mensaje}`, '_blank');
}
</script>

</body>
</html>
