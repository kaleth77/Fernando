<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servicios</title>

<!-- LIBRERÍA PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 10px;
    max-width: 500px;
    margin: auto;
}

.servicio {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: rgb(4, 5, 73);
    color: white;
    border-radius: 8px;
    margin-top: 10px;
}

/* FACTURA */
#factura {
    display: none;
    background: white;
    margin-top: 15px;
    padding: 20px;
    border-radius: 12px;
}

.factura-header {
    text-align: center;
    border-bottom: 1px solid #ddd;
    margin-bottom: 10px;
    padding-bottom: 10px;
}

#lista {
    list-style: none;
    padding: 0;
}

#lista li {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px dashed #ccc;
    padding: 5px 0;
}

.total {
    text-align: right;
    font-weight: bold;
    margin-top: 10px;
}
</style>

</head>
<body>

<header>
<h1>Servicios</h1>
<p>Selecciona lo que necesitas</p>
</header>

<div class="container">

<!-- SERVICIOS -->
<div class="servicio">
    <span>Diseño web - $100.000</span>
    <input type="checkbox" value="100000" data-nombre="Diseño web">
</div>

<div class="servicio">
    <span>Tienda online - $150.000</span>
    <input type="checkbox" value="150000" data-nombre="Tienda online">
</div>

<div class="servicio">
    <span>Mantenimiento - $50.000</span>
    <input type="checkbox" value="50000" data-nombre="Mantenimiento">
</div>

<button onclick="generarFactura()">Generar factura</button>

<!-- FACTURA -->
<div id="factura">
    <div class="factura-header">
        <h2>🧾 FACTURA</h2>
        <p>Gracias por su compra</p>
    </div>

    <ul id="lista"></ul>

    <div class="total">
        Total: $<span id="total">0</span>
    </div>

    <button onclick="descargarPDF()">Descargar PDF</button>
</div>

</div>

<script>
function generarFactura() {
    let checks = document.querySelectorAll('input[type="checkbox"]:checked');
    let lista = document.getElementById("lista");
    let total = 0;

    lista.innerHTML = "";

    checks.forEach(c => {
        let nombre = c.dataset.nombre;
        let precio = parseInt(c.value);

        total += precio;

        let li = document.createElement("li");

        // ✅ CORREGIDO (backticks)
        li.innerHTML = `<span>${nombre}</span><span>$${precio}</span>`;

        lista.appendChild(li);
    });

    document.getElementById("total").innerText = total;
    document.getElementById("factura").style.display = "block";
}

function descargarPDF() {
    let factura = document.getElementById("factura");

    html2pdf().from(factura).set({
        margin: 0.5,
        filename: "factura.pdf",
        html2canvas: { scale: 2 },
        jsPDF: { unit: "in", format: "letter", orientation: "portrait" }
    }).save();
}
</script>

</body>
</html>
