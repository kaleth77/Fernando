<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Servicios Electricos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 10px;
    max-width: 500px;
    margin: auto;
}

input[type="text"]{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.servicio {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: rgb(4, 5, 73);
    color: white;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

#factura {
    display: none;
    background: white;
    margin-top: 15px;
    padding: 20px;
    border-radius: 12px;
}
</style>

</head>
<body>

<header>
<h1>FB Servicios Eléctricos</h1>
<p>Selecciona lo que necesitas</p>
</header>

<div class="container">

<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="text" id="cedulaCliente" placeholder="Cédula">

<!-- SERVICIOS -->
<div class="servicio">
<span>Visita técnica - $20.000</span>
<button onclick="toggleCheck(this)">Agregar</button>
<input type="checkbox" value="20000" data-nombre="Visita técnica" hidden>
</div>

<div class="servicio">
<span>Reparaciones - $50.000</span>
<button onclick="toggleCheck(this)">Agregar</button>
<input type="checkbox" value="50000" data-nombre="Reparaciones" hidden>
</div>

<!-- OTRO -->
<div class="servicio">
<span>Otro servicio</span>
<button onclick="toggleCheck(this)">Agregar</button>
<input type="text" placeholder="Nombre" class="otro-nombre">
<input type="text" placeholder="Valor" class="otro-precio">
<input type="checkbox" hidden>
</div>

<!-- FACTURA -->
<div id="factura">
<h2>🧾 FACTURA</h2>
<p id="clienteNombre"></p>
<p id="clienteCedula"></p>
<ul id="lista"></ul>
<p><b>Total: $<span id="total">0</span></b></p>

<button onclick="descargarPDF()">Descargar PDF</button>
</div>

<button onclick="generarFactura()">Generar factura</button>

</div>

<script>

function toggleCheck(btn){
let check = btn.parentElement.querySelector('input[type="checkbox"]');
check.checked = !check.checked;
}

function formato(num){
return num.toLocaleString('es-CO');
}

function generarFactura(){

let nombreCliente = document.getElementById("nombreCliente").value;
let cedula = document.getElementById("cedulaCliente").value;

let checks = document.querySelectorAll('input[type="checkbox"]');
let lista = document.getElementById("lista");

let total = 0;
let mensaje = "🧾 Factura FB Servicios Eléctricos\n";

lista.innerHTML = "";

checks.forEach(c => {

if(c.checked){

let servicio = c.parentElement;

let nombre = c.dataset.nombre || servicio.querySelector(".otro-nombre")?.value;
let precio = parseInt(c.value) || parseInt(servicio.querySelector(".otro-precio")?.value);

if(nombre && precio){

total += precio;

let li = document.createElement("li");
li.innerHTML = `${nombre} - $${formato(precio)}`;
lista.appendChild(li);

mensaje += `• ${nombre}: $${formato(precio)}\n`;
}
}
});

document.getElementById("clienteNombre").innerText = nombreCliente;
document.getElementById("clienteCedula").innerText = "Cédula: " + cedula;
document.getElementById("total").innerText = formato(total);
document.getElementById("factura").style.display = "block";

mensaje += `\n💰 Total: $${formato(total)}`;

// WHATSAPP SOLO TEXTO (SIN LINK)
let mensajeCodificado = encodeURIComponent(mensaje);
window.open(`https://wa.me/573023507438?text=${mensajeCodificado}`, '_blank');

}

function descargarPDF(){
html2pdf().from(document.getElementById("factura")).save("factura.pdf");
}

</script>

</body>
</html>
