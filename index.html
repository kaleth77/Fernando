<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Servicios Electricos</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f4f4;
}
header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}
.container {
    padding: 10px;
    max-width: 500px;
    margin: auto;
}
input {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:1px solid #ccc;
}
.servicio {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
}
.btn-agregar{
    width:100%;
    padding:10px;
    background:#ece2c8;
    border:none;
    border-radius:6px;
}
button{
    width:100%;
    padding:12px;
    background:rgb(4,5,73);
    color:white;
    border:none;
    border-radius:8px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>FB Servicios Eléctricos</h1>
<p>Solicita tu servicio</p>
</header>

<div class="container">

<input id="nombre" placeholder="Nombre">
<input id="cedula" placeholder="Cédula">

<div class="servicio">
Visita técnica - $20.000
<button onclick="toggle(this)">Agregar</button>
<input type="checkbox" value="20000" data-nombre="Visita técnica" hidden>
</div>

<div class="servicio">
Reparaciones - $50.000
<button onclick="toggle(this)">Agregar</button>
<input type="checkbox" value="50000" data-nombre="Reparaciones" hidden>
</div>

<button onclick="enviar()">Pedir servicio</button>

</div>

<script>

function toggle(btn){
let c = btn.parentElement.querySelector("input");
c.checked = !c.checked;
}

function enviar(){

let nombre = document.getElementById("nombre").value;
let cedula = document.getElementById("cedula").value;

let msg = "📩 PEDIDO%0A";
msg += "Cliente: "+nombre+"%0A";
msg += "Cédula: "+cedula+"%0A";

document.querySelectorAll("input[type=checkbox]").forEach(c=>{
if(c.checked){
msg += "• "+c.dataset.nombre+" - $"+c.value+"%0A";
}
});

window.open("https://wa.me/573023507438?text="+msg);

}
</script>

</body>
</html>
