<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Servicios Electricos</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: rgb(4, 5, 73);
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 10px;
    max-width: 500px;
    margin: auto;
}

input[type="text"]{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.servicio {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: rgb(4, 5, 73);
    color: white;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}
</style>

</head>
<body>

<header>
<h1>FB Servicios Eléctricos</h1>
<p>Solicita tu servicio</p>
</header>

<div class="container">

<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="text" id="cedulaCliente" placeholder="Cédula">

<!-- SERVICIO 1 -->
<div class="servicio">
<span>Visita técnica de valoración - $20.000</span>
<button onclick="toggleCheck(this)">Agregar</button>
<input type="checkbox" value="20000" data-nombre="Visita técnica de valoración" hidden>
</div>

<!-- SERVICIO 2 -->
<div class="servicio">
<span>Mantenimiento aire acondicionado</span>
<button onclick="toggleCheck(this)">Agregar</button>

<select class="opciones" data-nombre="Mantenimiento aire acondicionado">
<option value="80000">Mantenimiento $80.000</option>
<option value="120000">Preventivo $120.000</option>
</select>

<input type="checkbox" data-nombre="Mantenimiento aire acondicionado" hidden>
</div>

<!-- SERVICIO 3 -->
<div class="servicio">
<span>Instalaciones Eléctricas</span>
<button onclick="toggleCheck(this)">Agregar</button>

<select class="opciones" data-nombre="Instalaciones Eléctricas">
<option value="20000">110V $20.000</option>
<option value="35000">220V $35.000</option>
</select>

<input type="checkbox" data-nombre="Instalaciones Eléctricas" hidden>
</div>

<!-- SERVICIO 4 -->
<div class="servicio">
<span>Reparaciones menores - $50.000</span>
<button onclick="toggleCheck(this)">Agregar</button>
<input type="checkbox" value="50000" data-nombre="Reparaciones menores" hidden>
</div>

<!-- OTRO -->
<div class="servicio">
<span>Otro servicio</span>
<button onclick="toggleCheck(this)">Agregar</button>
<input type="text" placeholder="Nombre del servicio" class="otro-nombre">
<input type="text" placeholder="Valor" class="otro-precio">
<input type="checkbox" hidden>
</div>

<button onclick="enviarPedido()">Pedir servicio</button>

</div>

<script>

function toggleCheck(btn){
let check = btn.parentElement.querySelector('input[type="checkbox"]');
check.checked = !check.checked;
btn.innerText = check.checked ? "Agregado ✔" : "Agregar";
}

function enviarPedido(){

let nombreCliente = document.getElementById("nombreCliente").value;
let cedula = document.getElementById("cedulaCliente").value;

let checks = document.querySelectorAll('input[type="checkbox"]');

let mensaje = "📩 *Nuevo pedido de servicio*%0A%0A";
mensaje += "👤 Cliente: " + nombreCliente + "%0A";
mensaje += "🆔 Cédula: " + cedula + "%0A%0A";
mensaje += "🛠 Servicios:%0A";

let total = 0;

checks.forEach(c => {
    if(c.checked){

        let servicio = c.parentElement;
        let select = servicio.querySelector(".opciones");

        let nombre = c.dataset.nombre;
        let precio = parseInt(c.value);

        if(select){
            nombre = select.dataset.nombre;
            precio = parseInt(select.value);
        }

        let otroNombre = servicio.querySelector(".otro-nombre");
        let otroPrecio = servicio.querySelector(".otro-precio");

        if(otroNombre && otroPrecio && otroNombre.value && otroPrecio.value){
            nombre = otroNombre.value;
            precio = parseInt(otroPrecio.value);
        }

        total += precio;

        mensaje += `• ${nombre} - $${precio}%0A`;
    }
});

mensaje += `%0A💰 Total estimado: $${total}`;

window.open(`https://wa.me/573023507438?text=${mensaje}`, '_blank');
}

</script>

</body>
</html>
